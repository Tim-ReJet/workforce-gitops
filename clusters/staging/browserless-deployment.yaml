apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f /tmp/workforce-compose.yaml -o k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: browserless
  name: browserless
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: browserless
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f /tmp/workforce-compose.yaml -o k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: browserless
    spec:
      containers:
        - env:
            - name: CONNECTION_TIMEOUT
              value: "60000"
            - name: MAX_CONCURRENT_SESSIONS
              value: "5"
            - name: MAX_QUEUE_LENGTH
              value: "10"
            - name: PREBOOT_CHROME
              value: "true"
          image: browserless/chrome:latest
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:3000/json/version
            failureThreshold: 5
            periodSeconds: 10
          name: browserless
          ports:
            - containerPort: 3000
              protocol: TCP
      restartPolicy: Always
