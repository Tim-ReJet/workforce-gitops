apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: default
  annotations:
    kompose.cmd: kompose convert -f /tmp/workforce-compose.yaml -o k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: temporal-ui
  name: temporal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: temporal-ui
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f /tmp/workforce-compose.yaml -o k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: temporal-ui
    spec:
      containers:
        - env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
            - name: TEMPORAL_CORS_ORIGINS
              value: http://localhost:3000
          image: temporalio/ui:latest
          name: temporal-ui
          ports:
            - containerPort: 8080
              protocol: TCP
      restartPolicy: Always
