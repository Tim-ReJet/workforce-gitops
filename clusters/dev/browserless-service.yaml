apiVersion: v1
kind: Service
metadata:
  namespace: default
  annotations:
    kompose.cmd: kompose convert -f /tmp/workforce-compose.yaml -o k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: browserless
  name: browserless
spec:
  ports:
    - name: "3000"
      port: 3000
      targetPort: 3000
  selector:
    io.kompose.service: browserless
