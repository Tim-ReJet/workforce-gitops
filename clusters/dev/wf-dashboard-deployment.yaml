apiVersion: v1
kind: Service
metadata:
  name: workforce-dashboard
  namespace: default
spec:
  selector:
    app: workforce-dashboard
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workforce-dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workforce-dashboard
  template:
    metadata:
      labels:
        app: workforce-dashboard
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: dashboard
          image: ghcr.io/tim-rejet/workforce-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
