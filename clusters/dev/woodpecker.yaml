apiVersion: v1
kind: Service
metadata:
  name: woodpecker-server
  namespace: default
spec:
  selector:
    app: woodpecker-server
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: woodpecker-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: woodpecker-server
  template:
    metadata:
      labels:
        app: woodpecker-server
    spec:
      containers:
        - name: server
          image: woodpeckerci/woodpecker-server:v3
          ports:
            - containerPort: 8000
            - containerPort: 9000
          env:
            - name: WOODPECKER_HOST
              value: "http://woodpecker-server:8000"
            - name: WOODPECKER_OPEN
              value: "true"
            - name: WOODPECKER_AGENT_SECRET
              value: "workforce-dev-secret"
            - name: WOODPECKER_DATABASE_DRIVER
              value: "sqlite3"
            - name: WOODPECKER_DATABASE_DATASOURCE
              value: "/var/lib/woodpecker/woodpecker.sqlite"
          volumeMounts:
            - name: data
              mountPath: /var/lib/woodpecker
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: woodpecker-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: woodpecker-agent
  template:
    metadata:
      labels:
        app: woodpecker-agent
    spec:
      containers:
        - name: agent
          image: woodpeckerci/woodpecker-agent:v3
          env:
            - name: WOODPECKER_SERVER
              value: "woodpecker-server:9000"
            - name: WOODPECKER_AGENT_SECRET
              value: "workforce-dev-secret"
            - name: WOODPECKER_MAX_WORKFLOWS
              value: "2"
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
