apiVersion: v1
kind: Service
metadata:
  name: workforce-agents
  namespace: default
spec:
  selector:
    app: workforce-agents
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workforce-agents
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workforce-agents
  template:
    metadata:
      labels:
        app: workforce-agents
    spec:
      containers:
        - name: agents
          image: docker.io/library/workforce-agents:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: workforce-agents-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
