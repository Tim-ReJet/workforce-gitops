apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f /tmp/workforce-compose.yaml -o k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: temporal-ui
  name: temporal-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: temporal-ui
  template:
    metadata:
      labels:
        io.kompose.service: temporal-ui
    spec:
      containers:
        - image: temporalio/ui:2.31.2
          name: temporal-ui
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /home/temporal/config/docker.yaml
              subPath: config.yaml
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: temporal-ui-config
      restartPolicy: Always
